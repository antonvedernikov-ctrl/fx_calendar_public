name: Refresh macro data

on:
  schedule:
    - cron: '0 1 * * 1-6'    # Mon–Sat at 01:00 UTC (after US market close)
  workflow_dispatch:           # manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance

      - name: Build macro JSON
        run: python build_macro_json.py --out-dir macro

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add macro/macro_data.json
          git diff --staged --quiet || git commit -m "chore: refresh macro data $(date -u +%Y-%m-%d)"
          git push
